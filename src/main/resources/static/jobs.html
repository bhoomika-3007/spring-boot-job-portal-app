<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Jobs — JobPortal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }

    /* NAVBAR */
    nav {
      background: #0f172a;
      padding: 0 60px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; text-decoration: none; }
    .nav-logo span { color: #3b82f6; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-cta {
      background: #3b82f6;
      color: #fff !important;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600 !important;
    }
    .nav-cta:hover { background: #2563eb; }

    /* HEADER SECTION */
    .page-header {
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      padding: 48px 60px;
      color: white;
    }
    .page-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .page-header p { color: #94a3b8; font-size: 15px; margin-bottom: 28px; }

    /* SEARCH BAR */
    .search-container {
      display: flex;
      gap: 12px;
      max-width: 600px;
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .search-input::placeholder { color: #94a3b8; }
    .search-input:focus { border-color: #3b82f6; background: rgba(255,255,255,0.15); }
    .search-btn {
      padding: 14px 28px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .search-btn:hover { background: #2563eb; }
    .clear-btn {
      padding: 14px 20px;
      background: transparent;
      color: #94a3b8;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .clear-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

    /* MAIN CONTENT */
    .content { padding: 40px 60px; }

    /* RESULTS META */
    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .results-count { font-size: 14px; color: #64748b; }
    .results-count strong { color: #0f172a; font-weight: 700; }

    /* JOBS GRID */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* JOB CARD */
    .job-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid #e2e8f0;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .job-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: #3b82f6;
      border-radius: 4px 0 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .job-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(15,23,42,0.12); border-color: #bfdbfe; }
    .job-card:hover::before { opacity: 1; }

    .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .job-title { font-size: 17px; font-weight: 700; color: #0f172a; flex: 1; padding-right: 12px; }
    .exp-badge {
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid #bfdbfe;
    }

    .job-desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tech-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tech-tag {
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
    .tech-tag.highlight {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    /* LOADING / EMPTY STATES */
    .state-container {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }
    .state-icon { font-size: 56px; margin-bottom: 20px; }
    .state-title { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
    .state-sub { font-size: 15px; color: #64748b; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      background: #0f172a;
      padding: 28px 60px;
      text-align: center;
      margin-top: 60px;
    }
    footer p { font-size: 13px; color: #475569; }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .page-header { padding: 32px 20px; }
      .content { padding: 24px 20px; }
      .search-container { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

	<!-- NAVBAR -->
	<nav>
	  <a href="index.html" class="nav-logo">Job<span>Portal</span></a>
	  <div class="nav-links">
	    <a href="jobs.html" class="active">Browse Jobs</a>
	    <a href="create.html">Post a Job</a>
	    <a href="create.html" class="nav-cta">Post a Job</a>
	  </div>
	</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>Browse Job Listings</h1>
  <p>Find opportunities that match your skills and experience</p>
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search by skill, role, or technology..." />
    <button class="search-btn" onclick="searchJobs()">Search</button>
    <button class="clear-btn" onclick="clearSearch()">Clear</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">
  <div class="results-meta">
    <div class="results-count" id="resultsCount">Loading jobs...</div>
  </div>
  <div class="jobs-grid" id="jobsGrid">
    <div class="state-container">
      <div class="spinner"></div>
      <div class="state-title">Loading Jobs</div>
      <div class="state-sub">Please wait...</div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>JobPortal — Built with Java Spring Boot + MySQL | Bhoomika &copy; 2025</p>
</footer>

<script>
  const API_BASE = 'http://localhost:8080';
  let currentSearch = '';

  function getTechColor(tech) {
    const t = tech.toLowerCase();
    if (t.includes('java') || t.includes('spring')) return 'highlight';
    if (t.includes('python')) return 'highlight';
    return '';
  }

  function renderJobs(jobs) {
    const grid = document.getElementById('jobsGrid');
    const countEl = document.getElementById('resultsCount');

    if (!jobs || jobs.length === 0) {
      countEl.innerHTML = '<strong>0</strong> jobs found';
      grid.innerHTML = `
        <div class="state-container">
          <div class="state-icon">🔍</div>
          <div class="state-title">No jobs found</div>
          <div class="state-sub">Try a different keyword or <a href="jobs.html" style="color:#3b82f6">view all jobs</a></div>
        </div>`;
      return;
    }

    countEl.innerHTML = `Showing <strong>${jobs.length}</strong> job${jobs.length !== 1 ? 's' : ''}${currentSearch ? ` for "<strong>${currentSearch}</strong>"` : ''}`;

    grid.innerHTML = jobs.map(job => {
      const techs = job.technologies ? job.technologies.split(',').map(t => t.trim()).filter(Boolean) : [];
      const techHTML = techs.map(t => `<span class="tech-tag ${getTechColor(t)}">${t}</span>`).join('');
      const expText = job.experience === 0 ? 'Fresher' : job.experience === 1 ? '1 yr exp' : `${job.experience} yrs exp`;
      return `
        <div class="job-card">
          <div class="job-header">
            <div class="job-title">${job.profile || 'Untitled Role'}</div>
            <span class="exp-badge">${expText}</span>
          </div>
          <div class="job-desc">${job.description || 'No description available.'}</div>
          <div class="tech-tags">${techHTML || '<span class="tech-tag">General</span>'}</div>
        </div>`;
    }).join('');
  }

  async function loadAllJobs() {
    try {
      const res = await fetch(`${API_BASE}/job-posts`);
      const jobs = await res.json();
      renderJobs(jobs);
    } catch (e) {
      document.getElementById('jobsGrid').innerHTML = `
        <div class="state-container">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Could not connect to server</div>
          <div class="state-sub">Make sure the Spring Boot app is running on port 8080</div>
        </div>`;
      document.getElementById('resultsCount').textContent = 'Error loading jobs';
    }
  }

  async function searchJobs() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) { loadAllJobs(); return; }
    currentSearch = keyword;
    document.getElementById('resultsCount').textContent = 'Searching...';
    document.getElementById('jobsGrid').innerHTML = `
      <div class="state-container">
        <div class="spinner"></div>
        <div class="state-title">Searching</div>
      </div>`;
    try {
      const res = await fetch(`${API_BASE}/job-posts/${encodeURIComponent(keyword)}`);
      const jobs = await res.json();
      renderJobs(jobs);
    } catch (e) {
      document.getElementById('jobsGrid').innerHTML = `<div class="state-container"><div class="state-icon">⚠️</div><div class="state-title">Search failed</div></div>`;
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    currentSearch = '';
    loadAllJobs();
  }

  // Handle URL param — e.g. jobs.html?search=java
  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('search');
    if (q) {
      document.getElementById('searchInput').value = q;
      currentSearch = q;
      searchJobs();
    } else {
      loadAllJobs();
    }
  });

  // Enter key search
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchJobs();
    });
  });
</script>
</body>
</html>
